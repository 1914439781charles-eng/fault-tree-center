<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fault Tree Collection</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
        }

        h1 {
            font-size: 28px;
            color: #1a2332;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats {
            font-size: 14px;
            color: #6b7a8f;
            background: #e9ecf0;
            padding: 4px 14px;
            border-radius: 20px;
        }

        /* Search box */
        .search-box {
            width: 100%;
            max-width: 340px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 2px solid #dce1e8;
            border-radius: 30px;
            font-size: 15px;
            background: white;
            transition: all 0.25s ease;
            outline: none;
        }

        .search-box input:focus {
            border-color: #4a90d9;
            box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.15);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.6;
        }

        /* Filter tabs */
        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 2px solid #e9ecf0;
        }

        .filter-tab {
            padding: 6px 18px;
            border-radius: 30px;
            border: 1.5px solid #dce1e8;
            background: white;
            cursor: pointer;
            font-size: 14px;
            color: #3d4a5c;
            transition: all 0.2s ease;
            user-select: none;
        }

        .filter-tab:hover {
            background: #f0f4f9;
        }

        .filter-tab.active {
            background: #1a2332;
            color: white;
            border-color: #1a2332;
        }

        .filter-tab .badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 30px;
            padding: 0 8px;
            font-size: 12px;
            margin-left: 4px;
        }

        .filter-tab.active .badge {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Card grid */
        .tree-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .tree-card {
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #eef1f5;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tree-card:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.07);
            transform: translateY(-2px);
            border-color: #c8d2df;
        }

        .tree-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 0;
        }

        .tree-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a2332;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tree-name .category-tag {
            font-size: 11px;
            font-weight: 500;
            background: #eef3f9;
            color: #2c5f8a;
            padding: 2px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .tree-desc {
            font-size: 13px;
            color: #6b7a8f;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tree-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f0f4f9;
            color: #1a2332;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.2s ease;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .tree-link:hover {
            background: #1a2332;
            color: white;
            transform: scale(1.05);
        }

        /* No results */
        .no-result {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 20px;
            color: #8a9aa8;
            font-size: 16px;
        }

        .no-result span {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                max-width: 100%;
            }

            .tree-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <img src="logo.png" alt="logo" style="height:32px;vertical-align:middle;"> Fault Tree List
                <span class="stats" id="totalCount">0 items</span>
            </h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name, description, or category..." autocomplete="off">
            </div>
        </div>

        <!-- Category filter tabs -->
        <div class="filter-tabs" id="filterTabs">
            <!-- Generated by JS -->
        </div>

        <!-- Card grid -->
        <div class="tree-grid" id="treeGrid">
            <!-- Generated by JS -->
        </div>
    </div>

    <script>  
        // ============================================================
        //  ★★★ Maintain your fault tree data here ★★★
        //  To add a new tree, simply add an object to this array.
        //  Supports filtering by "category" and searching by "name",
        //  "description", or "category".
        // ============================================================
        const treeData = [{
            id: 'tree-001',
            name: 'The sensor cannot be added to the built-in NS of the Milesight gateway',
            category: 'Function Troubleshooting',
            description: '',
            path: 'trees/The sensor cannot be added to the built-in NS of the Milesight gateway/'
        }, {
            id: 'tree-002',
            name: 'EM300-TH is sending abnormal data',
            category: 'Hardware Troubleshooting',
            description: '',
            path: 'trees/EM300-TH is sending abnormal data/'
        }, {
            id: 'tree-003',
            name: 'How to ensure the stability of D2D communication',
            category: 'Function Troubleshooting',
            description: '',
            path: 'trees/How to ensure the stability of D2D communication/'
        }, {
            id: 'tree-004',
            name: 'BACnet points on the Milesight gateway are not updating',
            category: 'Function Troubleshooting',
            description: '',
            path: 'trees/BACnet points on the Milesight gateway are not updating/'
        }, {
            id: 'tree-005',
            name: 'The Milesight gateway cannot register with the cellular network',
            category: 'Function Troubleshooting',
            description: '',
            path: 'trees/The Milesight gateway cannot register with the cellular network/'
        }, {
            id: 'tree-006',
            name: 'How to modify the target temperature of WT201 V2 using the downlink command',
            category: 'WT201 V2 Troubleshooting',
            description: '',
            path: 'trees/How to modify the target temperature of WT201 V2 using the downlink command/'
        }, {
            id: 'tree-007',
            name: 'WT201 cannot switch between temperature control modes via downlink',
            category: 'WT201 V2 Troubleshooting',
            description: '',
            path: 'trees/WT201 cannot switch between temperature control modes via downlink/'
        }, {
            id: 'tree-008',
            name: 'The CT sensor failed to start and report data.',
            category: 'CT Troubleshooting',
            description: '',
            path: 'trees/The CT sensor failed to start and report data./'
        }, {
            id: 'tree-009',
            name: 'VS341 device reported an abnormal occupancy value of 255',
            category: 'Hardware Troubleshooting',
            description: ' ',
            path: 'trees/VS341 device reported an abnormal occupancy value of 255/'
        }, {
            id: 'tree-010',
            name: 'The UG65 gateway detects no internet access via the Ping Tool',
            category: 'Function Troubleshooting',
            description: ' ',
            path: 'trees/The UG65 gateway detects no internet access via the Ping Tool/'
        }{
            id: 'tree-011',
            name: 'Troubleshooting Packet Loss of LoRaWAN Sensor Data',
            category: 'Function Troubleshooting',
            description: ' ',
            path: 'trees/Troubleshooting Packet Loss of LoRaWAN Sensor Data/'
        }];
        // ============================================================

        // ----- Rendering logic (no changes needed below) -----

        const grid = document.getElementById('treeGrid');
        const searchInput = document.getElementById('searchInput');
        const filterTabs = document.getElementById('filterTabs');
        const totalSpan = document.getElementById('totalCount');

        let activeCategory = 'All';

        function getCategories() {
            const cats = new Set(treeData.map(t => t.category).filter(Boolean));
            return ['All', ...Array.from(cats).sort()];
        }

        function renderTabs() {
            const categories = getCategories();
            const counts = {};
            treeData.forEach(t => {
                const cat = t.category || 'Uncategorized';
                counts[cat] = (counts[cat] || 0) + 1;
            });

            filterTabs.innerHTML = categories.map(cat => {
                const count = cat === 'All' ? treeData.length : (counts[cat] || 0);
                const activeClass = activeCategory === cat ? 'active' : '';
                return `<span class="filter-tab ${activeClass}" data-category="${cat}">
                            ${cat} <span class="badge">${count}</span>
                        </span>`;
            }).join('');

            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    activeCategory = this.dataset.category;
                    renderTabs();
                    renderCards();
                });
            });
        }

        function renderCards() {
            const keyword = searchInput.value.trim().toLowerCase();

            const filtered = treeData.filter(item => {
                if (activeCategory !== 'All' && item.category !== activeCategory) {
                    return false;
                }
                if (keyword) {
                    const searchable = [
                        item.name,
                        item.description,
                        item.category,
                        item.id
                    ].join(' ').toLowerCase();
                    if (!searchable.includes(keyword)) {
                        return false;
                    }
                }
                return true;
            });

            totalSpan.textContent = filtered.length + ' items';

            if (filtered.length === 0) {
                grid.innerHTML = `
                            <div class="no-result">
                                <span>🔎</span>
                                No matching fault trees found<br>
                                <small style="color:#b0c0ce;">Try a different keyword or category</small>
                            </div>
                        `;
                return;
            }

            grid.innerHTML = filtered.map(item => {
                const categoryTag = item.category ? `<span class="category-tag">${item.category}</span>` : '';
                const desc = item.description || '';

                return `
                            <div class="tree-card">
                                <div class="tree-info">
                                    <div class="tree-name">
                                        ${item.name}
                                        ${categoryTag}
                                    </div>
                                    ${desc ? `<div class="tree-desc">${desc}</div>` : ''}
                                </div>
                                <a href="${item.path}" class="tree-link" title="View fault tree">➜</a>
                            </div>
                        `;
            }).join('');
        }

        searchInput.addEventListener('input', function() {
            renderCards();
        });

        renderTabs();
        renderCards();
    </script>

</body>
</html>
