<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milesight Device Fault Tree Collection Navigation</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #f5f7fa;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
        }

        h1 {
            font-size: 28px;
            color: #1a2332;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats {
            font-size: 14px;
            color: #6b7a8f;
            background: #e9ecf0;
            padding: 4px 14px;
            border-radius: 20px;
        }

        .search-box {
            width: 100%;
            max-width: 340px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 2px solid #dce1e8;
            border-radius: 30px;
            font-size: 15px;
            background: white;
            outline: none;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.6;
        }

        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 2px solid #e9ecf0;
        }

        .filter-tab {
            padding: 6px 18px;
            border-radius: 30px;
            border: 1.5px solid #dce1e8;
            background: white;
            cursor: pointer;
            font-size: 14px;
            color: #3d4a5c;
        }

        .filter-tab.active {
            background: #1a2332;
            color: white;
        }

        .badge {
            margin-left: 6px;
            font-size: 12px;
            opacity: 0.8;
        }

        .tree-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .tree-card {
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid #eef1f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tree-name {
            font-size: 16px;
            font-weight: 600;
        }

        .category-tag {
            font-size: 11px;
            background: #eef3f9;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 8px;
            color: #2c5f8a;
        }

        .tree-desc {
            font-size: 13px;
            color: #6b7a8f;
        }

        .tree-link {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f4f9;
            border-radius: 50%;
            text-decoration: none;
        }

        .no-result {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: #8a9aa8;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>
            📊 Milesight Fault Tree Center
            <span class="stats" id="totalCount">0 items</span>
        </h1>

        <div class="search-box">
            <input id="searchInput" placeholder="Search name, category or description...">
        </div>
    </div>

    <div class="filter-tabs" id="filterTabs"></div>

    <div class="tree-grid" id="treeGrid"></div>

</div>

<script>

const treeData = [
    {
        id: 'tree-001',
        name: 'How to ensure the stability of D2D communication',
        category: 'D2D',
        description: '',
        path: 'trees/How to ensure the stability of D2D communication/'
    },
    {
        id: 'tree-002',
        name: 'EM300-TH Data Anomaly (127% or -0.1℃)',
        category: 'Hardware Failure',
        description: '',
        path: 'EM300-TH Data Anomaly (127% or -0.1℃)'
    },
    {
        id: 'tree-003',
        name: 'The sensor cannot be added to the built-in NS of the Milesight gateway',
        category: 'Function Troubleshooting',
        description: '',
        path: 'The sensor cannot be added to the built-in NS of the Milesight gateway'
    }
];

// -------------------- LOGIC --------------------

const grid = document.getElementById('treeGrid');
const searchInput = document.getElementById('searchInput');
const filterTabs = document.getElementById('filterTabs');
const totalSpan = document.getElementById('totalCount');

let activeCategory = 'ALL';

// categories
function getCategories() {
    const cats = new Set(treeData.map(t => t.category));
    return ['ALL', ...Array.from(cats)];
}

// tabs
function renderTabs() {
    const cats = getCategories();

    const counts = {};
    treeData.forEach(t => {
        counts[t.category] = (counts[t.category] || 0) + 1;
    });

    filterTabs.innerHTML = cats.map(cat => {
        const count = cat === 'ALL' ? treeData.length : counts[cat];
        return `
            <span class="filter-tab ${activeCategory === cat ? 'active' : ''}"
                  data-category="${cat}">
                ${cat} <span class="badge">${count}</span>
            </span>
        `;
    }).join('');

    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.onclick = () => {
            activeCategory = tab.dataset.category;
            renderTabs();
            renderCards();
        };
    });
}

// cards
function renderCards() {

    const keyword = searchInput.value.toLowerCase();

    const filtered = treeData.filter(item => {

        if (activeCategory !== 'ALL' && item.category !== activeCategory) {
            return false;
        }

        if (keyword) {
            const text = (item.name + item.category + item.description).toLowerCase();
            if (!text.includes(keyword)) return false;
        }

        return true;
    });

    totalSpan.textContent = filtered.length + ' items';

    if (filtered.length === 0) {
        grid.innerHTML = `
            <div class="no-result">
                🔎 No matching fault trees found<br>
                <small>Try different keywords or categories</small>
            </div>
        `;
        return;
    }

    grid.innerHTML = filtered.map(item => `
        <div class="tree-card">
            <div>
                <div class="tree-name">
                    ${item.name}
                    <span class="category-tag">${item.category}</span>
                </div>
                <div class="tree-desc">${item.description || ''}</div>
            </div>
            <a class="tree-link" href="${item.path}">➜</a>
        </div>
    `).join('');
}

// search
searchInput.addEventListener('input', renderCards);

// init
renderTabs();
renderCards();

</script>

</body>
</html>
