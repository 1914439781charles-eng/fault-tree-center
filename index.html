<!DOCTYPE html>
<html>
<head>
    <title>故障树集合</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; padding: 40px; max-width: 800px; margin: auto; }
        a { display: block; padding: 12px; margin: 6px 0; background: #f0f0f0; border-radius: 6px; text-decoration: none; color: #333; }
        a:hover { background: #e0e0e0; }
    </style>
</head>
<body>
    <h1>📊 故障树列表</h1>
    <div id="treeList"></div>

    <script>
        // 手动维护列表，新增时在这里添加即可
        const trees = [
            { name: '故障树 001 - 电源故障', path: 'trees/tree-001/' },
            { name: '故障树 002 - 网络故障', path: 'trees/tree-002/' },
            // 新增时在这里加一行
        ];

        const container = document.getElementById('treeList');
        trees.forEach(t => {
            const a = document.createElement('a');
            a.href = t.path;
            a.textContent = t.name + ' →';
            container.appendChild(a);
        });
    </script>
</body>
</html>
